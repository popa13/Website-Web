<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscillateur masse-ressort amorti</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>Visualisation de l'équation masse-ressort amortie</h1>
    <p class="subtitle">Équation: <strong>m u'' + γ u' + k u = 0</strong></p>

    <section class="panel controls">
      <h2>Paramètres (sliders + saisie numérique)</h2>
      <div class="controls-grid">
        <div class="control" data-key="m">
          <div class="control-head"><span>m</span><output id="mValue">1.00</output></div>
          <input id="mRange" type="range" min="0.1" max="10" step="0.1" value="1" />
          <input id="mNumber" type="number" min="0.1" max="10" step="0.1" value="1" />
        </div>

        <div class="control" data-key="gamma">
          <div class="control-head"><span>γ</span><output id="gammaValue">1.00</output></div>
          <input id="gammaRange" type="range" min="0" max="20" step="0.1" value="1" />
          <input id="gammaNumber" type="number" min="0" max="20" step="0.1" value="1" />
        </div>

        <div class="control" data-key="k">
          <div class="control-head"><span>k</span><output id="kValue">4.00</output></div>
          <input id="kRange" type="range" min="0.1" max="25" step="0.1" value="4" />
          <input id="kNumber" type="number" min="0.1" max="25" step="0.1" value="4" />
        </div>

        <div class="control" data-key="u0">
          <div class="control-head"><span>u(0)</span><output id="u0Value">1.00</output></div>
          <input id="u0Range" type="range" min="-8" max="8" step="0.1" value="1" />
          <input id="u0Number" type="number" min="-8" max="8" step="0.1" value="1" />
        </div>

        <div class="control" data-key="v0">
          <div class="control-head"><span>v(0)</span><output id="v0Value">0.00</output></div>
          <input id="v0Range" type="range" min="-20" max="20" step="0.1" value="0" />
          <input id="v0Number" type="number" min="-20" max="20" step="0.1" value="0" />
        </div>

        <div class="control" data-key="tMax">
          <div class="control-head"><span>t max</span><output id="tMaxValue">20</output></div>
          <input id="tMaxRange" type="range" min="2" max="60" step="1" value="20" />
          <input id="tMaxNumber" type="number" min="2" max="60" step="1" value="20" />
        </div>
      </div>
    </section>

    <section class="panel results">
      <h2>Régime et racines</h2>
      <p id="discriminant"></p>
      <p id="regime"></p>
      <p id="roots"></p>
      <p id="formula" class="formula"></p>
      <p id="constants"></p>
    </section>

    <section class="panel viz-panel">
      <div class="sim-head">
        <h2>Animation et solution</h2>
        <button id="playButton" type="button">▶ Play</button>
      </div>
      <p id="simInfo"></p>
      <div class="viz-grid">
        <div class="viz-card">
          <h3>Système masse-ressort (vertical)</h3>
          <svg id="springScene" viewBox="0 0 340 460" role="img" aria-label="Animation masse-ressort verticale">
            <rect x="70" y="12" width="200" height="16" class="ceiling" />
            <polyline id="spring" class="spring" points="" />
            <rect id="mass" x="130" y="220" width="80" height="64" rx="10" class="mass" />
          </svg>
        </div>
        <div class="viz-card">
          <h3>Solution u(t)</h3>
          <p id="chartMeta"></p>
          <canvas id="chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

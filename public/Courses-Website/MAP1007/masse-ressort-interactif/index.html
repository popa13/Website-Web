<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscillateur masse-ressort amorti</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>Visualisation de l'équation masse-ressort amortie</h1>
    <p class="subtitle">Équation: <strong>m u'' + γ u' + k u = 0</strong></p>

    <section class="panel controls">
      <h2>Paramètres</h2>
      <div class="grid">
        <label>
          m
          <input id="m" type="number" min="0.05" step="0.05" value="1" />
        </label>
        <label>
          γ
          <input id="gamma" type="number" min="0" step="0.1" value="1" />
        </label>
        <label>
          k
          <input id="k" type="number" min="0" step="0.1" value="4" />
        </label>
        <label>
          A
          <input id="A" type="number" step="0.1" value="1" />
        </label>
        <label>
          B
          <input id="B" type="number" step="0.1" value="0" />
        </label>
        <label>
          t max
          <input id="tMax" type="number" min="1" step="1" value="20" />
        </label>
      </div>
    </section>

    <section class="panel results">
      <h2>Régime et racines</h2>
      <p id="discriminant"></p>
      <p id="regime"></p>
      <p id="roots"></p>
      <p id="formula" class="formula"></p>
    </section>

    <section class="panel chart-panel">
      <h2>Solution u(t)</h2>
      <canvas id="chart" width="900" height="420"></canvas>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
